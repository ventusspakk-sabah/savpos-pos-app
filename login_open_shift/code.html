<body class="bg-background text-on-background font-body-md text-body-md overflow-hidden h-screen flex flex-col">

<!-- Abstract Background Shape -->

<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary-container opacity-20 rounded-full blur-3xl"></div>
<!-- Login Container -->
<div class="w-full max-w-md z-10 transition-all duration-500 transform scale-100 opacity-100" id="login-container">
<div class="bg-surface-container-lowest shadow-lg rounded-xl p-xl flex flex-col items-center">
<!-- Brand Identity -->

<p class="text-on-surface-variant font-body-md mt-xs">Professional POS System</p>
</div>
<!-- PIN Status -->
<div class="flex gap-md mb-xl h-touch-target-min items-center">
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant" id="dot-1"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant" id="dot-2"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant" id="dot-3"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant" id="dot-4"></div>
</div>
<p class="mb-lg text-on-surface-variant h-6 transition-opacity" id="pin-message">請輸入 4 位數 PIN 碼</p>
<!-- Number Pad -->
<div class="grid grid-cols-3 gap-md w-full max-w-[280px]">
<template id="numpad-btn">
<button class="w-full h-touch-target-min flex items-center justify-center rounded-lg bg-surface-container-low font-headline-md text-headline-md text-primary hover:bg-surface-variant transition-all active:scale-90"></button>
</template>
</div>
<div class="grid grid-cols-3 gap-md w-full max-w-[280px]" id="numpad-container">
<!-- JS will populate -->
</div>
</div>
</div>
<!-- Open Shift Modal (Hidden by Default) -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-lg bg-primary/20 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300" id="shift-modal">
<div class="bg-surface-container-lowest shadow-lg rounded-xl w-full max-w-md p-xl transform translate-y-8 transition-transform duration-300">
<div class="flex items-center gap-md mb-lg">
<div class="w-12 h-12 rounded-lg bg-tertiary-fixed flex items-center justify-center text-on-tertiary-fixed">
<span class="material-symbols-outlined" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<div>

</div>
</div>
<div class="space-y-lg">
<div class="space-y-xs">

</div>
</div>
<div class="bg-surface-container-low p-md rounded-lg flex justify-between items-center">

<script>
    const numpadContainer = document.getElementById('numpad-container');
    const dots = [1, 2, 3, 4].map(i => document.getElementById(`dot-${i}`));
    const loginContainer = document.getElementById('login-container');
    const shiftModal = document.getElementById('shift-modal');
    const pinMessage = document.getElementById('pin-message');
    const floatInput = document.getElementById('float-input');
    const confirmBtn = document.getElementById('confirm-shift');

    let currentPin = '';
    const correctPin = '1234';

    // Build Numpad
    const buttons = ['1', '2', '3', '4', '5', '6', '7', '8', '9', 'C', '0', '⌫'];
    buttons.forEach(label => {
      const btn = document.createElement('button');
      btn.className = "w-full h-14 flex items-center justify-center rounded-lg bg-surface-container-low font-headline-md text-headline-md text-primary hover:bg-surface-variant transition-all active:scale-90 shadow-sm";
      if (label === 'C') {
        btn.innerHTML = '<span class="text-error font-bold">C</span>';
        btn.onclick = () => resetPin();
      } else if (label === '⌫') {
        btn.innerHTML = '<span class="material-symbols-outlined" data-icon="backspace">backspace</span>';
        btn.onclick = () => backspace();
      } else {
        btn.innerText = label;
        btn.onclick = () => enterDigit(label);
      }
      numpadContainer.appendChild(btn);
    });

    function updateDots() {
      dots.forEach((dot, index) => {
        if (index < currentPin.length) {
          dot.classList.add('active', 'bg-primary');
          dot.classList.remove('border-outline-variant');
        } else {
          dot.classList.remove('active', 'bg-primary');
          dot.classList.add('border-outline-variant');
        }
      });
    }

    function enterDigit(digit) {
      if (currentPin.length < 4) {
        currentPin += digit;
        updateDots();
        if (currentPin.length === 4) {
          validatePin();
        }
      }
    }

    function backspace() {
      currentPin = currentPin.slice(0, -1);
      updateDots();
    }

    function resetPin() {
      currentPin = '';
      updateDots();
    }

    function validatePin() {
      if (currentPin === correctPin) {
        pinMessage.innerText = '驗證成功';
        pinMessage.classList.add('text-on-tertiary-container');
        
        // Transition to Modal
        setTimeout(() => {
          loginContainer.classList.add('opacity-0', 'scale-95');
          setTimeout(() => {
            loginContainer.classList.add('hidden');
            showShiftModal();
          }, 400);
        }, 300);
      } else {
        pinMessage.innerText = 'PIN 碼錯誤，請再試一次';
        pinMessage.classList.add('text-error');
        dots.forEach(dot => dot.classList.add('bg-error'));
        setTimeout(() => {
          resetPin();
          pinMessage.innerText = '請輸入 4 位數 PIN 碼';
          pinMessage.classList.remove('text-error');
        }, 1000);
      }
    }

    function showShiftModal() {
      shiftModal.classList.remove('pointer-events-none');
      shiftModal.classList.add('opacity-100');
      shiftModal.querySelector('div').classList.remove('translate-y-8');
      floatInput.focus();
    }

    confirmBtn.onclick = () => {
      confirmBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
      confirmBtn.disabled = true;
      
      setTimeout(() => {
        // Final success state transition
        confirmBtn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> <span>登入成功</span>';
        confirmBtn.classList.replace('bg-tertiary-container', 'bg-secondary-container');
        
        setTimeout(() => {
          // Here you would redirect to the main dashboard
          alert('正在進入系統...');
        }, 800);
      }, 1200);
    };
  </script>
