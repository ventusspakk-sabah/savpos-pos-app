<body class="bg-background text-on-background font-body-md min-h-screen pb-32">
<!-- Top App Bar -->
<header class="bg-surface dark:bg-background shadow-sm docked full-width top-0 sticky z-50">
<div class="flex justify-between items-center px-md h-touch-target-min w-full max-w-full">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary" data-icon="storefront">storefront</span>
<h1 class="text-headline-lg-mobile font-headline-lg-mobile font-bold text-primary dark:text-inverse-primary">Sav.pos</h1>
</div>
<div class="flex items-center gap-sm">
<button class="flex items-center justify-center w-touch-target-min h-touch-target-min rounded-full hover:bg-surface-container-low transition-transform active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="settings">settings</span>
</button>
</div>
</div>
</header>

</div>
<button class="mr-xs border border-outline text-on-surface px-md h-touch-target-min rounded-lg flex items-center gap-xs font-semibold active:scale-95 transition-all"><span class="material-symbols-outlined" data-icon="edit_square">edit_square</span><span>Bulk Actions</span></button><button class="bg-[#10b981] text-white px-md h-touch-target-min rounded-lg flex items-center gap-xs font-semibold shadow-sm active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
<span>Add New</span>
</button>
</div>
<!-- Controls -->

<div class="relative flex-1">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
<input class="w-full h-touch-target-min pl-xl pr-md bg-surface-container-lowest border border-outline-variant rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="Search products or SKU..." type="text"/>

</div>
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center bg-surface-container-lowest border border-outline-variant rounded-xl active:scale-95 transition-all">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="filter_list">filter_list</span>
</button>
</div>
<!-- Inventory List -->
<div class="space-y-sm">
<!-- Item 1: Low Stock Warning -->

<div class="flex-1 min-w-0">

</div>
<p class="text-label-sm font-label-sm text-outline">SKU: AZM-00912</p>
<div class="flex items-center gap-xs mt-xs">
<span class="px-xs py-[2px] bg-error-container text-on-error-container text-[10px] font-bold rounded uppercase">Low Stock</span>
<span class="text-label-sm font-label-sm text-on-error-container">Only 3 left</span>
</div>
</div>
<div class="flex flex-col gap-xs flex-row w-full justify-end">
<button class="h-8 px-sm bg-primary text-white rounded text-label-sm font-label-sm active:scale-95 transition-all flex-1">Restock</button>
<button class="h-8 px-sm border border-outline text-on-surface rounded text-label-sm font-label-sm active:scale-95 transition-all flex-1">Edit</button>
</div>
</div>
<!-- Item 2: Normal Stock -->

<div class="flex justify-between items-start">

</div>
</div>
<div class="flex flex-col gap-xs flex-row w-full justify-end">

<button class="h-8 px-sm border border-outline text-on-surface rounded text-label-sm font-label-sm active:scale-95 transition-all flex-1">Edit</button>
</div>
</div>
<!-- Item 3: Moderate Stock -->

</div>
<div class="flex-1 min-w-0">
<div class="flex justify-between items-start">
<h3 class="font-headline-md text-headline-md truncate">Studio Headphones</h3>

<div class="flex flex-col gap-xs flex-row w-full justify-end">

</div>
<div class="flex-1 min-w-0">
<div class="flex justify-between items-start">
<h3 class="font-headline-md text-headline-md truncate">Eco Desk Lamp</h3>
<span class="font-label-md text-label-md text-primary font-bold">$54.00</span>
</div>
<p class="text-label-sm font-label-sm text-outline">SKU: EDL-11200</p>
<div class="flex items-center gap-xs mt-xs">
<span class="px-xs py-[2px] bg-error text-white text-[10px] font-bold rounded uppercase">Out of Stock</span>
</div>
</div>
<div class="flex flex-col gap-xs flex-row w-full justify-end">
<button class="h-8 px-sm bg-error text-white rounded text-label-sm font-label-sm active:scale-95 transition-all flex-1">Restock</button>
<button class="h-8 px-sm border border-outline text-on-surface rounded text-label-sm font-label-sm active:scale-95 transition-all flex-1">Edit</button>
</div>
</div>
</div>
</main>
<!-- Bottom Nav Bar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-md pb-md pt-xs bg-surface dark:bg-surface-container-lowest rounded-t-lg shadow-lg">
<!-- Sale -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-xs hover:text-primary dark:hover:text-inverse-primary transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="point_of_sale">point_of_sale</span>
<span class="text-label-sm font-label-sm">Sale</span>
</button>
<!-- Stock (Active) -->
<button class="flex flex-col items-center justify-center bg-secondary-container dark:bg-primary-container text-on-secondary-container dark:text-on-primary-container rounded-full px-lg py-xs active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="inventory_2" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
<span class="text-label-sm font-label-sm">Stock</span>
</button>
<!-- Reports -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-xs hover:text-primary dark:hover:text-inverse-primary transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="text-label-sm font-label-sm">Reports</span>
</button>
<!-- History -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline p-xs hover:text-primary dark:hover:text-inverse-primary transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="text-label-sm font-label-sm">History</span>
</button>
</nav>
<script>
        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-95');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-95');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-95');
            });
        });
    </script>
</body></html>
