<style>

        @keyframes subtle-bounce {
            0%, 100% { transform: translateY(0) scale(1); opacity: 1; }

        @keyframes progress-shimmer {

        }

        .loader-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;

<!-- Interactive Micro-Interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simulate loading state transitions
            const loader = document.querySelector('.loader-bar');
            let progress = 0;
            
            const interval = setInterval(() => {
                progress += Math.random() * 10;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    // Subtle hint that it's ready, could trigger a redirect here
                    console.log('System ready.');
                }
            }, 300);

            // Add a mouse-move parallax effect for the glow
            document.addEventListener('mousemove', (e) => {
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                
                const glows = document.querySelectorAll('.blur-3xl');
                glows.forEach((glow, index) => {
                    const factor = (index + 1) * 20;
                    glow.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
                });
            });
        });
    </script>
