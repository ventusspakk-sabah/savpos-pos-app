<body class="bg-surface-default flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="w-full top-0 sticky bg-surface dark:bg-inverse-surface border-b border-outline-border dark:border-outline z-50">
<div class="flex items-center h-14 px-margin-mobile w-full">
<button class="material-symbols-outlined text-primary dark:text-primary-fixed active:opacity-80 transition-opacity p-2 -ml-2">arrow_back</button>
<h1 class="flex-grow font-headline-md text-headline-md text-primary dark:text-primary-fixed ml-4">Refund/Void Order</h1>
<button class="material-symbols-outlined text-on-surface-variant dark:text-on-tertiary-container active:opacity-80 transition-opacity p-2 -mr-2">more_vert</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow p-margin-mobile md:px-margin-tablet lg:max-w-3xl lg:mx-auto w-full pb-32">
<div class="space-y-6">
<!-- Step Indicator -->
<div class="flex items-center space-x-2">
<span class="w-2 h-2 rounded-full bg-primary"></span>
<span class="w-2 h-2 rounded-full bg-surface-container-highest"></span>
<span class="w-2 h-2 rounded-full bg-surface-container-highest"></span>
<p class="font-label-md text-label-md text-on-surface-variant ml-2">Step 1: Selection &amp; Reason</p>
</div>
<!-- Section 1: Refund Type -->
<section class="bg-white border border-outline-border rounded-xl p-6 space-y-4">
<h2 class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider">Refund Type</h2>
<div class="grid grid-cols-1 gap-3">
<label class="flex items-center justify-between p-4 border border-primary bg-primary-container/5 rounded-lg cursor-pointer transition-all hover:bg-primary-container/10">
<div class="flex items-center">
<input checked="" class="w-5 h-5 text-primary border-outline-border focus:ring-primary" name="refund_type" type="radio"/>
<span class="ml-4 font-body-md text-body-md text-primary font-semibold">Full Refund</span>
</div>
<span class="font-label-lg text-label-lg text-primary">$185.00</span>
</label>
<label class="flex items-center justify-between p-4 border border-outline-border rounded-lg cursor-pointer transition-all hover:bg-surface-container-low">
<div class="flex items-center">
<input class="w-5 h-5 text-primary border-outline-border focus:ring-primary" name="refund_type" type="radio"/>
<span class="ml-4 font-body-md text-body-md text-on-surface">Partial Refund</span>
</div>
<span class="font-label-lg text-label-lg text-on-surface-variant">Amount...</span>
</label>
</div>
</section>
<!-- Section 2: Refund Method -->
<section class="bg-white border border-outline-border rounded-xl p-6 space-y-4">
<h2 class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider">Refund Method</h2>
<div class="relative">
<select class="w-full h-[56px] appearance-none bg-white border border-outline-border rounded-lg px-4 pr-10 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/20">
<option>Original Payment (Credit Card •••• 4242)</option>
<option>Store Credit (Immediate Balance)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</section>
<!-- Section 3: Reason for Refund -->
<section class="bg-white border border-outline-border rounded-xl p-6 space-y-4">
<h2 class="font-label-lg text-label-lg text-on-surface uppercase tracking-wider">Reason for Refund</h2>
<div class="space-y-1">
<button class="w-full flex items-center justify-between h-[56px] px-4 rounded-lg border-b border-outline-border hover:bg-surface-container-low transition-colors group">
<span class="font-body-md text-body-md text-on-surface">Customer dissatisfaction</span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between h-[56px] px-4 rounded-lg border-b border-outline-border hover:bg-surface-container-low transition-colors group">
<span class="font-body-md text-body-md text-on-surface">Incorrect item</span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between h-[56px] px-4 rounded-lg border-b border-outline-border hover:bg-surface-container-low transition-colors group">
<span class="font-body-md text-body-md text-on-surface">Service cancelled</span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between h-[56px] px-4 rounded-lg border-b border-outline-border hover:bg-surface-container-low transition-colors group">
<span class="font-body-md text-body-md text-on-surface">System error</span>
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary">chevron_right</span>
</button>
</div>
<div class="mt-4">
<label class="block font-label-md text-label-md text-on-surface-variant mb-2">Additional Notes (Other)</label>
<textarea class="w-full p-4 border border-outline-border rounded-lg bg-surface-container-lowest font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 placeholder:text-outline" placeholder="Enter reason for refund..." rows="3"></textarea>
</div>
</section>
<!-- Warning Box -->
<div class="bg-error-container/30 border border-error/20 p-4 rounded-lg flex items-start space-x-3">
<span class="material-symbols-outlined text-error-alert flex-shrink-0" style="font-variation-settings: 'FILL' 1;">warning</span>
<p class="font-body-md text-body-md text-on-error-container">
<span class="font-bold">Note:</span> This action will trigger a commission clawback of <span class="font-bold">$80.00</span> for the assigned technicians.
                </p>
</div>
</div>
</main>
<!-- Bottom Action Area (Stationary but styled for Mobile POS) -->
<footer class="fixed bottom-0 left-0 w-full bg-white border-t border-outline-border p-margin-mobile flex items-center justify-between z-50">
<div class="hidden md:block">
<p class="font-label-md text-label-md text-on-surface-variant">Refund Summary</p>
<p class="font-headline-md text-headline-md text-error-alert">$185.00</p>
</div>
<div class="flex space-x-4 w-full md:w-auto">
<button class="flex-1 md:w-32 h-touch-target-min border border-outline-border rounded-lg font-label-lg text-label-lg text-primary hover:bg-surface-container transition-colors active:scale-95">
                Cancel
            </button>
<button class="flex-[2] md:w-64 h-touch-target-min bg-error-alert text-white rounded-lg font-label-lg text-label-lg shadow-sm hover:opacity-90 active:scale-95 transition-all flex items-center justify-center space-x-2">
<span>Confirm Refund</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</footer>
<!-- Modal Background Visual Ornament (Glassmorphism effect in background) -->
<div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -z-10 w-[800px] h-[800px] opacity-20 pointer-events-none">
<div class="absolute inset-0 bg-primary blur-[120px] rounded-full"></div>
</div>
<script>
        // Simple Interaction logic for selecting list items
        document.querySelectorAll('button[class*="group"]').forEach(btn => {
            btn.addEventListener('click', () => {
                // Clear others
                document.querySelectorAll('button[class*="group"]').forEach(b => {
                    b.classList.remove('bg-primary-container/10', 'border-primary');
                    b.querySelector('.material-symbols-outlined').textContent = 'chevron_right';
                    b.querySelector('.material-symbols-outlined').classList.remove('text-primary');
                });
                // Set active
                btn.classList.add('bg-primary-container/10', 'border-primary');
                btn.querySelector('.material-symbols-outlined').textContent = 'check_circle';
                btn.querySelector('.material-symbols-outlined').classList.add('text-primary');
            });
        });
    </script>
</body></html>
