<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center pt-16 pb-12 px-margin-mobile">
<!-- Profile Selector (Bento Style Layout) -->

</div>
<span class="font-label-md text-label-md text-on-surface-variant group-[.active]:text-secondary">Manager</span>
</button>
<button class="profile-card active group flex flex-col items-center p-4 bg-surface-container-lowest border border-secondary rounded-xl transition-all hover:border-secondary hover:shadow-md" onclick="selectProfile('Cashier')">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center mb-2 ring-2 ring-secondary">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="person" data-weight="fill" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<span class="font-label-md text-label-md text-secondary">Cashier</span>
</button>
<button class="profile-card group flex flex-col items-center p-4 bg-surface-container-lowest border border-outline-variant rounded-xl transition-all hover:border-secondary hover:shadow-md" onclick="selectProfile('Tech')">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center mb-2 group-[.active]:ring-2 group-[.active]:ring-secondary">
<span class="material-symbols-outlined text-on-secondary-container" data-icon="construction">construction</span>
</div>

</button>
</div>
<!-- Identity Confirmation -->
<div class="text-center mb-8">
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-2" id="greeting">Welcome back, Cashier</h2>
<p class="text-on-surface-variant font-body-md text-body-md">Enter your 4-digit security PIN</p>
</div>
<!-- PIN Indicators -->
<div class="flex gap-6 mb-12" id="pin-container">
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant bg-transparent"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant bg-transparent"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant bg-transparent"></div>
<div class="pin-dot w-4 h-4 rounded-full border-2 border-outline-variant bg-transparent"></div>
</div>
<!-- Keypad Container (Modern Flat Grid) -->
<div class="grid grid-cols-3 gap-x-8 gap-y-4 max-w-xs w-full mb-12">
<button class="keypad-button h-20 w-20 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-container-high transition-colors active:bg-secondary-container group" onclick="appendPin(1)">

<button class="keypad-button h-20 w-20 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-container-high transition-colors active:bg-secondary-container group" onclick="appendPin(3)">

<button class="keypad-button h-20 w-20 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-container-high transition-colors active:bg-secondary-container group" onclick="appendPin(5)">

</button>
<button class="keypad-button h-20 w-20 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-container-high transition-colors active:bg-secondary-container group" onclick="appendPin(6)">

<button class="keypad-button h-20 w-20 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-container-high transition-colors active:bg-secondary-container group" onclick="appendPin(7)">

<button class="keypad-button h-20 w-20 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-container-high transition-colors active:bg-secondary-container group" onclick="appendPin(9)">
<span class="font-headline-md text-headline-md text-on-surface group-active:text-on-secondary-container">9</span>
</button>
<div class="h-20 w-20"></div>
<button class="keypad-button h-20 w-20 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-container-high transition-colors active:bg-secondary-container group" onclick="appendPin(0)">
<span class="font-headline-md text-headline-md text-on-surface group-active:text-on-secondary-container">0</span>
</button>
<button class="keypad-button h-20 w-20 rounded-full border border-outline-variant flex items-center justify-center hover:bg-surface-container-high transition-colors active:bg-secondary-container group" onclick="backspace()">

<!-- Visual Backdrop Element (Atmospheric Gradient) -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary-container opacity-20 blur-[120px]"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[30%] h-[30%] rounded-full bg-primary-container opacity-10 blur-[100px]"></div>
</div>
<script>
        let pin = [];
        const maxPinLength = 4;
        const dots = document.querySelectorAll('.pin-dot');

        function appendPin(num) {
            if (pin.length < maxPinLength) {
                pin.push(num);
                updateDots();
                if (pin.length === maxPinLength) {
                    validatePin();
                }
            }
        }

        function backspace() {
            pin.pop();
            updateDots();
        }

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < pin.length) {
                    dot.classList.add('bg-secondary', 'border-secondary', 'filled');
                    dot.classList.remove('bg-transparent', 'border-outline-variant');
                } else {
                    dot.classList.remove('bg-secondary', 'border-secondary', 'filled');
                    dot.classList.add('bg-transparent', 'border-outline-variant');
                }
            });
        }

        function validatePin() {
            // Visual feedback for processing
            const container = document.getElementById('pin-container');
            container.classList.add('animate-pulse');
            
            setTimeout(() => {
                // Mock validation: 1234 is the "success" pin
                if (pin.join('') === '1234') {
                    dots.forEach(dot => dot.classList.replace('bg-secondary', 'bg-on-secondary-container'));
                    document.body.classList.add('opacity-0', 'transition-opacity', 'duration-500');
                    alert('Access Granted. Redirecting to Terminal Dashboard...');
                } else {
                    container.classList.remove('animate-pulse');
                    container.classList.add('animate-bounce');
                    dots.forEach(dot => {
                        dot.classList.replace('bg-secondary', 'bg-error');
                        dot.classList.replace('border-secondary', 'border-error');
                    });
                    
                    setTimeout(() => {
                        container.classList.remove('animate-bounce');
                        pin = [];
                        updateDots();
                        dots.forEach(dot => {
                            dot.classList.remove('bg-error', 'border-error');
                            dot.classList.add('border-outline-variant');
                        });
                    }, 1000);
                }
            }, 500);
        }

        function selectProfile(role) {
            document.getElementById('greeting').innerText = `Welcome back, ${role}`;
            document.querySelectorAll('.profile-card').forEach(card => {
                card.classList.remove('active', 'border-secondary');
                card.classList.add('border-outline-variant');
                card.querySelector('span:last-child').classList.replace('text-secondary', 'text-on-surface-variant');
                card.querySelector('div').classList.remove('ring-2', 'ring-secondary');
            });
            
            const activeCard = event.currentTarget;
            activeCard.classList.add('active', 'border-secondary');
            activeCard.classList.remove('border-outline-variant');
            activeCard.querySelector('span:last-child').classList.replace('text-on-surface-variant', 'text-secondary');
            activeCard.querySelector('div').classList.add('ring-2', 'ring-secondary');
            
            // Reset PIN on profile switch
            pin = [];
            updateDots();
        }
    </script>
