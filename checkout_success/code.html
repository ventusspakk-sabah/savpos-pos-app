<span class="font-body-md text-body-md" id="toast-message">Email sent successfully!</span>
</div>
<script>
        // Countdown Timer Logic
        let timeLeft = 5;
        const timerText = document.getElementById('timer-text');
        const timerCircle = document.getElementById('timer-circle');
        const totalOffset = 100.53; // Circumference for r=16

        const countdown = setInterval(() => {
            timeLeft -= 0.05;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerText.innerText = "0";
                // In a real app, this would redirect
                console.log("Auto-redirecting...");
                document.body.style.opacity = "0.5";
                document.body.style.pointerEvents = "none";
                setTimeout(() => window.location.reload(), 1000);
            } else {
                timerText.innerText = Math.ceil(timeLeft);
                const offset = totalOffset * (1 - (timeLeft / 5));
                timerCircle.style.strokeDashoffset = offset;
            }
        }, 50);

        // Interaction Simulation
        function showToast(message, icon = 'check_circle') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');
            
            toastMsg.innerText = message;
            toastIcon.innerText = icon;
            
            toast.classList.remove('translate-y-32');
            setTimeout(() => {
                toast.classList.add('translate-y-32');
            }, 3000);
        }

        function simulateSend(btn) {
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Sending...`;
            btn.disabled = true;
            
            setTimeout(() => {
                showToast("Receipt emailed to customer");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 1200);
        }

        function simulatePrint(btn) {
            const originalText = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-pulse">print</span> Printing...`;
            btn.disabled = true;
            
            setTimeout(() => {
                showToast("Sending document to terminal printer...", "print");
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 1500);
        }

        // Stop timer on interaction
        document.addEventListener('mousedown', () => {
            clearInterval(countdown);
            document.getElementById('close-timer-container').style.opacity = "0.3";
        }, { once: true });
    </script>
