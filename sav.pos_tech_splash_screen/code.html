<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scale-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .animate-subtle-pulse {
            animation: scale-pulse 4s ease-in-out infinite;
        }
        .bg-gradient-mesh {
            background: radial-gradient(at 0% 0%, #f7f9fb 0%, transparent 50%),
                        radial-gradient(at 100% 0%, #eceef0 0%, transparent 50%),
                        radial-gradient(at 100% 100%, #f2f4f6 0%, transparent 50%),
                        radial-gradient(at 0% 100%, #ffffff 0%, transparent 50%);
            background-color: #f7f9fb;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-between overflow-hidden selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Ambient Background Texture -->
<div class="fixed inset-0 z-0 bg-gradient-mesh opacity-60"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex flex-col items-center justify-center w-full max-w-lg px-lg text-center">
<!-- Logo Container -->
<div class="mb-xl animate-subtle-pulse">
<div class="relative w-32 h-32 md:w-40 md:h-40 rounded-xl overflow-hidden shadow-lg bg-surface-container-lowest ring-1 ring-outline-variant/10">
<img alt="Sav.pos Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0ujAKrMUG4JuUgaofYArl9-ydg-0lIKwBi6cb_Ngkzjy6heugzGiiUqwNLU6iqJkzKVsJGv1lOOM94sKCJz7urvnGzjpWCQ56x6lmoHaQaqEK_UZ9iEyfU2O4JlWfuOm1cA-yd3gxJfVcTIEP4HwB1lKvM1t8NwjCDf3_FyYwokAuyVhetFpb3gXQekkcg-J_hHep-DYSDgVS8BPIgmF7AT0ZYg94U17G9wMg7UCr1ExT9qey11noo8yXgA"/>
</div>
</div>
<!-- Identity Section -->
<div class="space-y-sm animate-fade-in-up" style="animation-delay: 0.2s;">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tight">
                Sav.pos <span class="text-secondary font-light italic">Tech</span>
</h1>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-[0.2em] border-y border-outline-variant/20 py-base inline-block">
                Technician Portal
            </p>
</div>
<!-- Progress/Loading Indicator (Micro-interaction) -->
<div class="mt-xl w-48 h-[2px] bg-surface-container-highest rounded-full overflow-hidden animate-fade-in-up" style="animation-delay: 0.4s;">
<div class="h-full bg-secondary-container transition-all duration-[3000ms] ease-out w-0" id="progress-bar"></div>
</div>
</main>
<!-- Footer Identity -->
<footer class="relative z-10 pb-xl animate-fade-in-up" style="animation-delay: 0.6s;">
<div class="flex flex-col items-center gap-xs">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">self_care</span>
<p class="font-label-sm text-label-sm text-on-surface-variant/70 tracking-widest uppercase">
                Your Craft, Empowered
            </p>
</div>
</footer>
<!-- Interactive Layer -->
<script>
        // Simulate initial loading sequence for splash effect
        window.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            
            // Trigger progress bar animation
            setTimeout(() => {
                progressBar.style.width = '100%';
            }, 100);

            // Optional: Handle interaction/auto-transition logic here
            document.body.addEventListener('click', () => {
                // Add a haptic-like visual feedback on click
                document.body.classList.add('scale-[0.995]');
                setTimeout(() => document.body.classList.remove('scale-[0.995]'), 150);
            });
        });
    </script>
</body></html>
