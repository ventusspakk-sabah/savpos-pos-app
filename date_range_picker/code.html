<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }
        .range-start {
            border-top-left-radius: 9999px;
            border-bottom-left-radius: 9999px;
        }
        .range-end {
            border-top-right-radius: 9999px;
            border-bottom-right-radius: 9999px;
        }
        .range-between {
            background-color: rgba(125, 182, 255, 0.2);
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Top App Bar (Shared Component Reference) -->
<header class="bg-surface sticky top-0 z-50 shadow-sm flex justify-between items-center px-md py-xs w-full max-w-full">
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-primary p-xs hover:bg-surface-variant/50 transition-colors active:scale-95 duration-200">arrow_back</button>
<h1 class="font-headline-md text-headline-md text-on-surface">選擇日期範圍 (Select Date Range)</h1>
</div>
<button class="material-symbols-outlined text-primary p-xs hover:bg-surface-variant/50 transition-colors active:scale-95 duration-200">history</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-md py-lg flex flex-col gap-lg lg:max-w-4xl lg:mx-auto w-full">
<!-- Selection Summary Card -->
<div class="bg-surface-container-lowest rounded-xl p-md shadow-sm flex flex-col gap-md">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<span class="font-label-sm text-label-sm text-on-surface-variant">開始日期 (Start Date)</span>
<span class="font-headline-md text-headline-md text-primary" id="start-date-display">2023年10月12日</span>
</div>
<div class="w-xs h-md border-r border-outline-variant"></div>
<div class="flex flex-col items-end">
<span class="font-label-sm text-label-sm text-on-surface-variant">結束日期 (End Date)</span>
<span class="font-headline-md text-headline-md text-primary" id="end-date-display">2023年10月24日</span>
</div>
</div>
<div class="bg-surface-container-low rounded-lg p-sm flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary text-body-md" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<span class="font-body-md text-body-md text-on-surface">總計 12 天 (Total 12 Days)</span>
</div>
</div>
<!-- Calendar Container -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm p-md">
<!-- Calendar Header -->
<div class="flex items-center justify-between mb-lg">
<button class="material-symbols-outlined text-on-surface-variant p-xs hover:bg-surface-variant transition-colors rounded-full active:scale-95">chevron_left</button>
<h2 class="font-headline-md text-headline-md text-on-surface">2023年 10月</h2>
<button class="material-symbols-outlined text-on-surface-variant p-xs hover:bg-surface-variant transition-colors rounded-full active:scale-95">chevron_right</button>
</div>
<!-- Days of Week -->
<div class="calendar-grid mb-sm">
<div class="text-center font-label-sm text-label-sm text-on-surface-variant py-xs">日</div>
<div class="text-center font-label-sm text-label-sm text-on-surface-variant py-xs">一</div>
<div class="text-center font-label-sm text-label-sm text-on-surface-variant py-xs">二</div>
<div class="text-center font-label-sm text-label-sm text-on-surface-variant py-xs">三</div>

<div class="text-center font-label-sm text-label-sm text-on-surface-variant py-xs">六</div>
</div>
<!-- Dates Grid -->

<div class="flex flex-wrap gap-xs">
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant font-label-md text-label-md hover:bg-surface-variant active:scale-95 transition-all">今天 (Today)</button>

<footer class="fixed bottom-0 left-0 w-full z-50 bg-surface-container-highest rounded-t-xl shadow-lg px-md py-lg lg:max-w-4xl lg:left-1/2 lg:-translate-x-1/2">

<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                確認選擇 (Confirm)
            </button>
</div>
</footer>
<!-- Bottom Spacer for Fixed Footer -->
<div class="h-32 lg:h-40"></div>
<!-- Background Illustration / Aesthetic Elements -->
<div class="hidden lg:block fixed -right-20 top-40 -z-10 opacity-10 blur-xl">
<div class="w-96 h-96 bg-primary rounded-full"></div>
</div>
<div class="hidden lg:block fixed -left-20 bottom-40 -z-10 opacity-10 blur-xl">
<div class="w-80 h-80 bg-secondary rounded-full"></div>
</div>
<script>
        // Micro-interactions for date clicking (Conceptual logic for demonstration)
        document.querySelectorAll('.calendar-grid .relative').forEach(cell => {
            cell.addEventListener('click', function() {
                // In a real app, we'd handle range selection logic here.
                // For this UI demo, we'll just show an active state toggle on the cell
                if (!this.classList.contains('range-start') && !this.classList.contains('range-end') && !this.classList.contains('range-between')) {
                    this.classList.add('bg-surface-variant', 'rounded-full');
                    setTimeout(() => this.classList.remove('bg-surface-variant', 'rounded-full'), 300);
                }
            });
        });
    </script>
</body></html>
