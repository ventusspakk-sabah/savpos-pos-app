<script>
        // Micro-interaction for form template changes
        const shiftTemplate = document.getElementById('shiftTemplate');
        const startInput = document.querySelector('input[type="time"]:nth-of-type(1)');
        const endInput = document.querySelector('input[type="time"]:nth-of-type(2)');

        shiftTemplate.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val === 'morning') {
                startInput.value = '09:00';
                endInput.value = '18:00';
            } else if (val === 'middle') {
                startInput.value = '12:00';
                endInput.value = '21:00';
            } else if (val === 'night') {
                startInput.value = '14:00';
                endInput.value = '23:00';
            }
        });

        // Simple form submission feedback
        document.getElementById('shiftForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> 處理中...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> 已儲存';
                btn.classList.replace('bg-secondary-container', 'bg-tertiary-fixed');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-tertiary-fixed', 'bg-secondary-container');
                    btn.disabled = false;
                }, 2000);
            }, 1000);
        });
    </script>
