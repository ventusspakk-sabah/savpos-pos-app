            0% { transform: scale(1); }
            100% { transform: scale(1.05); }

            animation: subtle-zoom 20s infinite alternate ease-in-out;
        }
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in-up 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .delay-200 { animation-delay: 0.2s; }
        .delay-400 { animation-delay: 0.4s; }
        .delay-600 { animation-delay: 0.6s; }

<button class="w-full py-4 bg-primary-container text-on-primary-container rounded-lg font-headline-md flex items-center justify-center gap-md shadow-sm hover:shadow-md active:scale-95 transition-all duration-200 group" onclick="handleLogin()">
<span class="material-symbols-outlined" data-icon="login">login</span>

                Business Insights &amp; Group Management
            </p>
</div>
</main>
<!-- Secure Footer Indicator -->
<footer class="fixed bottom-xl left-0 w-full flex flex-col items-center gap-sm opacity-0 animate-fade-in delay-600">
<div class="flex items-center gap-xs px-md py-xs bg-surface-container-high/50 backdrop-blur-sm rounded-full border border-outline-variant/20 shadow-sm">

<!-- Micro-interaction Scripts -->
<script>
        function handleLogin() {
            // Subtle transition effect simulation
            const main = document.querySelector('main');
            const footer = document.querySelector('footer');
            
            main.style.transition = 'all 0.8s cubic-bezier(0.7, 0, 0.3, 1)';
            footer.style.transition = 'all 0.8s cubic-bezier(0.7, 0, 0.3, 1)';
            
            main.style.opacity = '0';
            main.style.transform = 'scale(1.05) translateY(-20px)';
            footer.style.opacity = '0';
            footer.style.transform = 'translateY(20px)';
            
            setTimeout(() => {
                // In a real app, this would redirect or mount the dashboard
                console.log("Redirecting to Executive Admin Dashboard...");
            }, 800);
        }

        // Add subtle mouse move parallax effect to background
        document.addEventListener('mousemove', (e) => {
            const amount = 15;
            const x = (e.clientX / window.innerWidth - 0.5) * amount;
            const y = (e.clientY / window.innerHeight - 0.5) * amount;
            
            const bg = document.querySelector('.animate-subtle-zoom');
            if (bg) {
                bg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
            }
        });
    </script>
