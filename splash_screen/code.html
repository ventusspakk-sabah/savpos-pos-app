<script>
        // Simulate loading progress
        const circle = document.getElementById('loading-circle');
        const radius = 20;
        const circumference = 2 * Math.PI * radius;
        let progress = 0;

        function updateProgress() {
            if (progress >= 100) {
                // Flash finish effect
                circle.classList.add('scale-110', 'opacity-0');
                setTimeout(() => {
                    progress = 0;
                    circle.classList.remove('scale-110', 'opacity-0');
                    updateProgress();
                }, 500);
                return;
            }
            
            progress += Math.random() * 5;
            if (progress > 100) progress = 100;
            
            const offset = circumference - (progress / 100) * circumference;
            circle.style.strokeDashoffset = offset;
            
            setTimeout(updateProgress, 100 + Math.random() * 200);
        }

        // Start loading simulation
        setTimeout(updateProgress, 500);

        // Entrance animation
        window.addEventListener('DOMContentLoaded', () => {
            const center = document.getElementById('brand-center');
            const footer = document.getElementById('footer-branding');
            
            center.style.opacity = '0';
            center.style.transform = 'translateY(20px)';
            footer.style.opacity = '0';
            
            requestAnimationFrame(() => {
                center.style.transition = 'opacity 1s ease-out, transform 1s ease-out';
                footer.style.transition = 'opacity 1s ease-out 0.5s';
                center.style.opacity = '1';
                center.style.transform = 'translateY(0)';
                footer.style.opacity = '0.6';
            });
        });
    </script>
