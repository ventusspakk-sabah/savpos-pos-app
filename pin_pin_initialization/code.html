        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pin-dot {
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .keypad-button:active {
            transform: scale(0.92);
            background-color: var(--surface-container-highest);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">
<!-- Top Navigation Anchor (Suppressed in transactional flows per rules, but showing TopAppBar for Brand identity) -->
<header class="bg-surface dark:bg-primary docked full-width top-0 z-50">
<div class="flex items-center justify-between px-md py-xs w-full max-w-7xl mx-auto">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed" data-icon="spa">spa</span>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Sav.pos</h1>
</div>
<div class="flex items-center gap-md">
<div class="flex items-center gap-xs px-sm py-xs rounded-full bg-surface-container-high">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<span class="font-label-md text-label-md text-on-surface-variant">Step 3 of 3</span>
</div>
</div>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-md py-xl">
<!-- Canvas Container -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-md overflow-hidden p-lg md:p-xl space-y-xl">
<!-- Headline Section -->
<div class="text-center space-y-xs">
<h2 class="font-headline-lg text-headline-lg text-on-surface" id="pin-instruction">Set Your Access PIN</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Use this PIN to quickly unlock the POS terminal and authorize transactions.</p>
</div>
<!-- PIN Display -->
<div class="flex justify-center gap-md py-md">
<div class="pin-dot w-5 h-5 rounded-full border-2 border-outline-variant bg-transparent" id="dot-0"></div>
<div class="pin-dot w-5 h-5 rounded-full border-2 border-outline-variant bg-transparent" id="dot-1"></div>
<div class="pin-dot w-5 h-5 rounded-full border-2 border-outline-variant bg-transparent" id="dot-2"></div>
<div class="pin-dot w-5 h-5 rounded-full border-2 border-outline-variant bg-transparent" id="dot-3"></div>
</div>
<!-- Numeric Keypad -->
<div class="grid grid-cols-3 gap-md w-full max-w-[320px] mx-auto">
<!-- Numbers 1-9 -->
<button class="keypad-button h-touch-target-min aspect-square flex items-center justify-center rounded-full bg-surface-container-low font-headline-md text-headline-md text-on-surface hover:bg-surface-variant transition-all" onclick="handleKey('1')">1</button>
<button class="keypad-button h-touch-target-min aspect-square flex items-center justify-center rounded-full bg-surface-container-low font-headline-md text-headline-md text-on-surface hover:bg-surface-variant transition-all" onclick="handleKey('2')">2</button>
<button class="keypad-button h-touch-target-min aspect-square flex items-center justify-center rounded-full bg-surface-container-low font-headline-md text-headline-md text-on-surface hover:bg-surface-variant transition-all" onclick="handleKey('3')">3</button>
<button class="keypad-button h-touch-target-min aspect-square flex items-center justify-center rounded-full bg-surface-container-low font-headline-md text-headline-md text-on-surface hover:bg-surface-variant transition-all" onclick="handleKey('4')">4</button>
<button class="keypad-button h-touch-target-min aspect-square flex items-center justify-center rounded-full bg-surface-container-low font-headline-md text-headline-md text-on-surface hover:bg-surface-variant transition-all" onclick="handleKey('5')">5</button>
<button class="keypad-button h-touch-target-min aspect-square flex items-center justify-center rounded-full bg-surface-container-low font-headline-md text-headline-md text-on-surface hover:bg-surface-variant transition-all" onclick="handleKey('6')">6</button>
<button class="keypad-button h-touch-target-min aspect-square flex items-center justify-center rounded-full bg-surface-container-low font-headline-md text-headline-md text-on-surface hover:bg-surface-variant transition-all" onclick="handleKey('7')">7</button>
<button class="keypad-button h-touch-target-min aspect-square flex items-center justify-center rounded-full bg-surface-container-low font-headline-md text-headline-md text-on-surface hover:bg-surface-variant transition-all" onclick="handleKey('8')">8</button>
<button class="keypad-button h-touch-target-min aspect-square flex items-center justify-center rounded-full bg-surface-container-low font-headline-md text-headline-md text-on-surface hover:bg-surface-variant transition-all" onclick="handleKey('9')">9</button>
<!-- Bottom Row -->
<div class="h-touch-target-min flex items-center justify-center"></div>
<button class="keypad-button h-touch-target-min aspect-square flex items-center justify-center rounded-full bg-surface-container-low font-headline-md text-headline-md text-on-surface hover:bg-surface-variant transition-all" onclick="handleKey('0')">0</button>
<button class="keypad-button h-touch-target-min aspect-square flex items-center justify-center rounded-full bg-transparent text-outline hover:text-on-surface transition-all" onclick="handleBackspace()">
<span class="material-symbols-outlined text-[28px]" data-icon="backspace">backspace</span>
</button>
</div>
<!-- Progress & Security Info -->
<div class="pt-md border-t border-surface-container-high flex flex-col items-center gap-sm">
<div class="flex items-center gap-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="lock">lock</span>
<span class="font-label-sm text-label-sm">Encrypted Connection</span>
</div>
<!-- Final Stage Success Indicator (Hidden by default) -->
<div class="hidden flex items-center gap-sm text-on-tertiary-container bg-tertiary-fixed/30 px-md py-xs rounded-full animate-bounce" id="success-indicator">
<span class="material-symbols-outlined" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-md text-label-md">PIN Configuration Complete</span>
</div>
</div>
</div>
</main>
<!-- Bottom Help Bar (Shared Component Pattern) -->
<footer class="fixed bottom-0 w-full z-50 flex justify-around items-center px-lg py-sm pb-safe bg-surface-container-low dark:bg-primary-container shadow-md rounded-t-xl">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-primary-container/70 hover:bg-surface-variant transition-all rounded-full px-4 py-1" href="#">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
<span class="font-label-md text-label-md">Help</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-primary-container/70 hover:bg-surface-variant transition-all rounded-full px-4 py-1" href="#">
<span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
<span class="font-label-md text-label-md">Contact Support</span>
</a>
</footer>
<script>
        let pin = "";
        let confirmPin = "";
        let isConfirming = false;

        function handleKey(num) {
            if (pin.length < 4) {
                pin += num;
                updateDots();
                if (pin.length === 4) {
                    setTimeout(() => processPin(), 300);
                }
            }
        }

        function handleBackspace() {
            if (pin.length > 0) {
                pin = pin.slice(0, -1);
                updateDots();
            }
        }

        function updateDots() {
            for (let i = 0; i < 4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if (i < pin.length) {
                    dot.classList.add('bg-secondary', 'border-secondary', 'scale-110');
                    dot.classList.remove('bg-transparent', 'border-outline-variant');
                } else {
                    dot.classList.remove('bg-secondary', 'border-secondary', 'scale-110');
                    dot.classList.add('bg-transparent', 'border-outline-variant');
                }
            }
        }

        function processPin() {
            if (!isConfirming) {
                confirmPin = pin;
                pin = "";
                isConfirming = true;
                document.getElementById('pin-instruction').innerText = "Confirm Your Access PIN";
                updateDots();
            } else {
                if (pin === confirmPin) {
                    // Success logic
                    document.getElementById('pin-instruction').innerText = "Identity Verified";
                    document.getElementById('success-indicator').classList.remove('hidden');
                    document.querySelectorAll('.keypad-button').forEach(btn => btn.disabled = true);
                    // In a real app, redirection would happen here
                } else {
                    // Error logic
                    pin = "";
                    updateDots();
                    const instruction = document.getElementById('pin-instruction');
                    instruction.innerText = "PINs Don't Match";
                    instruction.classList.add('text-error');
                    setTimeout(() => {
                        instruction.innerText = "Confirm Your Access PIN";
                        instruction.classList.remove('text-error');
                    }, 1000);
                }
            }
        }
    </script>
</body></html>
