<script>
        // Simple micro-interaction for Save button
        document.querySelector('button.bg-tertiary-container').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Saving...';
            btn.disabled = true;
            btn.style.opacity = '0.7';
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Changes Saved';
                btn.classList.replace('bg-tertiary-container', 'bg-on-tertiary-container');
                btn.classList.replace('text-on-tertiary-container', 'text-on-tertiary');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.replace('bg-on-tertiary-container', 'bg-tertiary-container');
                    btn.classList.replace('text-on-tertiary', 'text-on-tertiary-container');
                    btn.disabled = false;
                    btn.style.opacity = '1';
                }, 2000);
            }, 1200);
        });
    </script>
