<!-- Optional Floating Action Button (FAB) - Suppressed on Search Result for clarity per instructions, but kept logic here if needed for primary screens -->
<script>
        // Simple Micro-interaction for Reset Button
        document.querySelector('button:has(.material-symbols-outlined:contains("restart_alt"))')?.addEventListener('click', () => {
            const input = document.querySelector('input[type="text"]');
            if (input) {
                input.value = '';
                input.focus();
                // Simulation of refreshing
                document.body.style.opacity = '0.7';
                setTimeout(() => {
                    document.body.style.opacity = '1';
                }, 300);
            }
        });

        // Search highlight interaction
        const searchInput = document.querySelector('input');
        searchInput.addEventListener('focus', () => {
            searchInput.parentElement.classList.add('scale-[1.01]');
        });
        searchInput.addEventListener('blur', () => {
            searchInput.parentElement.classList.remove('scale-[1.01]');
        });
    </script>
