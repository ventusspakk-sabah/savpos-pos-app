<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .modal-backdrop {
            backdrop-filter: blur(8px);
            background-color: rgba(0, 9, 27, 0.4);
        }
        .bottom-sheet {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e0e3e5;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen font-body-md overflow-hidden">
<!-- Main Background Content (Technician Commission Screen Placeholder) -->
<div class="p-md space-y-md filter blur-sm">
<header class="flex justify-between items-center py-sm">
<h1 class="text-headline-lg-mobile font-headline-lg-mobile">佣金報表</h1>
<span class="material-symbols-outlined text-on-surface-variant">notifications</span>
</header>
<div class="bg-surface-container-lowest p-md rounded-xl shadow-sm border border-outline-variant/30">
<p class="text-label-md font-label-md text-on-surface-variant mb-xs">本月預估佣金</p>
<p class="text-display-price font-display-price text-primary">$42,850</p>
</div>
<div class="space-y-sm">
<div class="bg-surface-container-lowest p-sm rounded-lg flex justify-between items-center">
<div class="flex items-center gap-sm">
<div class="w-10 h-10 bg-secondary-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-container">spa</span>
</div>
<div>
<p class="font-bold">深層組織按摩</p>
<p class="text-label-sm font-label-sm text-outline">2023/10/24 14:30</p>
</div>
</div>
<p class="font-bold text-on-tertiary-container">+$850</p>
</div>
</div>
</div>
<!-- Modal Backdrop -->
<div class="fixed inset-0 z-40 modal-backdrop opacity-100 transition-opacity duration-300" id="modalBackdrop"></div>
<!-- Advanced Filter Bottom Sheet -->
<div class="fixed inset-x-0 bottom-0 z-50 bottom-sheet transform translate-y-0" id="bottomSheet">
<div class="bg-surface-container-lowest w-full max-h-[795px] rounded-t-[32px] flex flex-col shadow-2xl border-t border-outline-variant/20">
<!-- Handle -->
<div class="w-full flex justify-center py-sm">
<div class="w-12 h-1.5 bg-surface-variant rounded-full"></div>
</div>
<!-- Header -->
<div class="px-lg pb-md flex justify-between items-center">
<h2 class="text-headline-md font-headline-md text-primary">進階篩選 (Advanced Filter)</h2>
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center rounded-full hover:bg-surface-container-low active:scale-95 transition-all" onclick="closeModal()">
<span class="material-symbols-outlined text-on-surface-variant" style="font-variation-settings: 'opsz' 40;">close</span>
</button>
</div>
<!-- Content Area -->
<div class="flex-1 overflow-y-auto px-lg space-y-xl pb-32 custom-scrollbar">
<!-- Order Type -->
<section>
<label class="text-label-md font-label-md text-on-surface-variant mb-sm block">訂單類型 (Order Type)</label>
<div class="flex flex-wrap gap-xs">
<button class="px-md py-xs rounded-full bg-secondary-container text-on-secondary-container text-label-md font-label-md border border-transparent transition-all active:scale-95">全部</button>
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant text-label-md font-label-md border border-outline-variant/30 hover:bg-surface-variant transition-all active:scale-95">服務佣金</button>
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant text-label-md font-label-md border border-outline-variant/30 hover:bg-surface-variant transition-all active:scale-95">產品銷售</button>
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant text-label-md font-label-md border border-outline-variant/30 hover:bg-surface-variant transition-all active:scale-95">加成獎勵</button>
</div>
</section>
<!-- Status -->
<section>
<label class="text-label-md font-label-md text-on-surface-variant mb-sm block">佣金狀態 (Status)</label>
<div class="flex flex-wrap gap-xs">
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant text-label-md font-label-md border border-outline-variant/30 active:scale-95 transition-all">全部</button>
<button class="px-md py-xs rounded-full bg-secondary-container text-on-secondary-container text-label-md font-label-md border border-transparent active:scale-95 transition-all">保障期內 (Held)</button>
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant text-label-md font-label-md border border-outline-variant/30 active:scale-95 transition-all">可提領 (Available)</button>
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant text-label-md font-label-md border border-outline-variant/30 active:scale-95 transition-all">已結算 (Settled)</button>
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant text-label-md font-label-md border border-outline-variant/30 active:scale-95 transition-all">已沖銷 (Clawbacked)</button>
</div>
</section>
<!-- Amount Range -->
<section>
<label class="text-label-md font-label-md text-on-surface-variant mb-sm block">金額區間 (Amount Range)</label>
<div class="grid grid-cols-2 gap-md">
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-outline text-label-md font-label-md">$</span>
<input class="w-full pl-lg pr-md py-sm bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-secondary text-body-md shadow-sm" placeholder="Min" type="number"/>
</div>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-outline text-label-md font-label-md">$</span>
<input class="w-full pl-lg pr-md py-sm bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-secondary text-body-md shadow-sm" placeholder="Max" type="number"/>
</div>
</div>
</section>
<!-- Service Search -->
<section>
<label class="text-label-md font-label-md text-on-surface-variant mb-sm block">服務項目 (Service)</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">search</span>
<input class="w-full pl-xl pr-md py-sm bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-secondary text-body-md shadow-sm" placeholder="搜尋服務名稱 (例如: Deep Tissue)" type="text"/>
</div>
<div class="mt-sm flex flex-wrap gap-xs">
<div class="flex items-center gap-xs px-sm py-1.5 bg-tertiary-fixed/20 text-on-tertiary-fixed-variant rounded-lg text-label-sm font-label-sm">
                            Deep Tissue <span class="material-symbols-outlined text-[16px] cursor-pointer">close</span>
</div>
<div class="flex items-center gap-xs px-sm py-1.5 bg-tertiary-fixed/20 text-on-tertiary-fixed-variant rounded-lg text-label-sm font-label-sm">
                            Aromatherapy <span class="material-symbols-outlined text-[16px] cursor-pointer">close</span>
</div>
</div>
</section>
<!-- Quick Date -->
<section>
<label class="text-label-md font-label-md text-on-surface-variant mb-sm block">快速時間 (Quick Date)</label>
<div class="flex flex-wrap gap-xs">
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant text-label-md font-label-md border border-outline-variant/30 hover:bg-surface-variant transition-all">今日</button>
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant text-label-md font-label-md border border-outline-variant/30 hover:bg-surface-variant transition-all">昨日</button>
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant text-label-md font-label-md border border-outline-variant/30 hover:bg-surface-variant transition-all">本週</button>
<button class="px-md py-xs rounded-full bg-surface-container-high text-on-surface-variant text-label-md font-label-md border border-outline-variant/30 hover:bg-surface-variant transition-all">上週</button>
<button class="px-md py-xs rounded-full bg-secondary-container text-on-secondary-container text-label-md font-label-md border border-transparent">本月</button>
</div>
</section>
</div>
<!-- Footer -->
<div class="absolute bottom-0 inset-x-0 p-lg bg-surface-container-lowest/90 backdrop-blur-md border-t border-outline-variant/20 flex gap-md">
<button class="flex-1 py-md border-2 border-secondary text-secondary font-bold rounded-xl active:scale-95 transition-all" onclick="closeModal()">重置 (Reset)</button>
<button class="flex-[2] py-md bg-primary-container text-on-primary-container font-bold rounded-xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-sm" onclick="closeModal()">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">filter_alt</span>
                    套用篩選 (Apply)
                </button>
</div>
</div>
</div>
<script>
        function closeModal() {
            const bottomSheet = document.getElementById('bottomSheet');
            const backdrop = document.getElementById('modalBackdrop');
            
            bottomSheet.style.transform = 'translateY(100%)';
            backdrop.style.opacity = '0';
            
            setTimeout(() => {
                bottomSheet.classList.add('hidden');
                backdrop.classList.add('hidden');
            }, 300);
        }

        // Quick micro-interaction for chip toggles
        document.querySelectorAll('button').forEach(btn => {
            if (btn.classList.contains('rounded-full')) {
                btn.addEventListener('click', function() {
                    // Logic for multi-select could go here
                    // Simple toggle visualization for prototype
                    if (this.textContent !== '全部') {
                        this.classList.toggle('bg-secondary-container');
                        this.classList.toggle('text-on-secondary-container');
                        this.classList.toggle('bg-surface-container-high');
                        this.classList.toggle('text-on-surface-variant');
                    }
                });
            }
        });
    </script>
</body></html>
